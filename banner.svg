<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="In a chat assistant a request is typed and the skill outputs a context file that emerges from the chat; you carry that file into a coding agent, where work begins">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFAF8"/>
      <stop offset="1" stop-color="#F1EDE6"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E08A6B"/>
      <stop offset="1" stop-color="#D97757"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#D9CFC1" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#9C8E7A" flood-opacity="0.18"/>
    </filter>
    <clipPath id="typeclip">
      <rect x="90" y="226" width="0" height="26">
        <animate attributeName="width" values="0;0;200;200;0;0" keyTimes="0;0.02;0.16;0.17;0.18;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- titles -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#2A2723">From conversation to execution</text>
  <text x="600" y="61" text-anchor="middle" font-size="13" fill="#8A7E6E" letter-spacing="1.5">CHAT&#160;&#160;&#8594;&#160;&#160;<tspan fill="#D97757" font-weight="700">YOU</tspan>&#160;&#160;&#8594;&#160;&#160;CODING&#160;AGENT</text>

  <!-- ===================== LEFT CARD: chat assistant ===================== -->
  <g filter="url(#soft)">
    <rect x="52" y="84" width="330" height="176" rx="18" fill="#FFFFFF" stroke="#EAE2D6" stroke-width="1.5"/>
  </g>
  <circle cx="80" cy="112" r="6" fill="url(#clay)"/>
  <text x="96" y="117" font-size="15" font-weight="600" fill="#3A352E">chat</text>

  <!-- prior conversation (the context) — collapses as the file forms -->
  <g>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.36;1" dur="12s" repeatCount="indefinite"/>
    <rect x="78" y="132" width="150" height="20" rx="10" fill="#F1ECE4"/>
    <rect x="196" y="158" width="178" height="20" rx="10" fill="#F6E4DC"/>
  </g>

  <!-- skill running chip -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.17;0.22;0.30;0.34;1" dur="12s" repeatCount="indefinite"/>
    <rect x="112" y="100" width="210" height="26" rx="13" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
    <text x="128" y="117" font-size="12.5" font-weight="700" fill="#C06A4B"><tspan fill="#E08A6B">&#10022; </tspan>coding-agent-handoff</text>
  </g>

  <!-- input box with typed request -->
  <rect x="78" y="222" width="258" height="32" rx="16" fill="#F7F3EC" stroke="#E7DECF" stroke-width="1.3"/>
  <text x="92" y="243" clip-path="url(#typeclip)" font-family="'SF Mono','JetBrains Mono','Fira Mono',Menlo,Consolas,monospace" font-size="12" fill="#4A4337">
    hand off to my coding agent
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.16;0.19;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <g>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.17;0.175;0.99;1" dur="12s" repeatCount="indefinite"/>
    <rect y="231" width="2" height="14" fill="#D97757">
      <animate attributeName="x" values="92;92;286;286;92" keyTimes="0;0.02;0.16;0.985;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <circle cx="358" cy="238" r="15" fill="url(#clay)"/>
  <path d="M 352 232 L 365 238 L 352 244 Z" fill="#FFFFFF"/>

  <!-- ===================== RIGHT CARD: coding agent ===================== -->
  <g filter="url(#soft)">
    <rect x="818" y="84" width="330" height="176" rx="18" fill="#FFFFFF" stroke="#EAE2D6" stroke-width="1.5"/>
    <path d="M 818 102 a18 18 0 0 1 18 -18 h294 a18 18 0 0 1 18 18 v16 h-330 Z" fill="#F6F2EB"/>
  </g>
  <circle cx="840" cy="101" r="4.5" fill="#E5C0B4"/>
  <circle cx="856" cy="101" r="4.5" fill="#EBD8B8"/>
  <circle cx="872" cy="101" r="4.5" fill="#C9DCC2"/>
  <text x="1126" y="106" text-anchor="end" font-size="11" font-weight="600" fill="#9A8E7C">coding agent</text>

  <g font-family="'SF Mono','JetBrains Mono','Fira Mono',Menlo,Consolas,monospace" font-size="12.5">
    <!-- idle prompt (waiting for you to drop the brief in) -->
    <g>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.62;0.64;0.99;1" dur="12s" repeatCount="indefinite"/>
      <text x="842" y="152" fill="#C06A4B">&#10095;</text>
      <rect x="858" y="142" width="8" height="13" fill="#D97757">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- work, revealed in sequence -->
    <text x="842" y="148" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>reading the brief&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.69;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="842" y="170" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>orienting in repo&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.75;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="842" y="192" fill="#4E7A52" font-weight="600" opacity="0"><tspan font-weight="700">+ </tspan>implementing the plan
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.77;0.81;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="842" y="214" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>running tests&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.86;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.86;0.97;1" dur="12s" repeatCount="indefinite"/>
      <rect x="842" y="226" width="220" height="8" rx="4" fill="#EDE6DB"/>
      <rect x="842" y="226" width="0" height="8" rx="4" fill="url(#clay)">
        <animate attributeName="width" values="0;0;220;220;0" keyTimes="0;0.87;0.94;0.97;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="842" y="252" fill="#4E7A52" font-weight="700" opacity="0"><tspan>&#10003; </tspan>12 passing
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.94;0.96;0.99;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ====== THE CONTEXT FILE — emerges from the chat, then you carry it ====== -->
  <!-- outer group: travels from INSIDE the chat card across to the coding agent -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.33;0.62;0.66;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion path="M 300 150 C 470 105, 710 105, 868 150" keyTimes="0;0.45;0.62;1" keyPoints="0;0;1;1" calcMode="linear" dur="12s" repeatCount="indefinite"/>

    <!-- inner group: scales up as the chat generates it -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.55;0.55;1;1" keyTimes="0;0.30;0.40;1" dur="12s" repeatCount="indefinite"/>

      <circle cx="0" cy="0" r="30" fill="url(#glow)">
        <animate attributeName="r" values="24;34;24" dur="1.4s" repeatCount="indefinite"/>
      </circle>

      <g filter="url(#soft)">
        <path d="M -26 -32 H 14 L 26 -20 V 32 H -26 Z" fill="#FFFFFF" stroke="#D97757" stroke-width="2" stroke-linejoin="round"/>
        <path d="M 14 -32 V -20 H 26 Z" fill="#F6E5DD" stroke="#D97757" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <rect x="-18" y="-24" width="22" height="4" rx="2" fill="#E2A488"/>
      <rect x="-18" y="-13" width="36" height="3.5" rx="1.75" fill="#EFCBBA"/>
      <rect x="-18" y="-4" width="32" height="3.5" rx="1.75" fill="#EFCBBA"/>
      <rect x="-18" y="5" width="36" height="3.5" rx="1.75" fill="#EFCBBA"/>
      <rect x="-18" y="14" width="22" height="3.5" rx="1.75" fill="#EFCBBA"/>
      <text x="0" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#C06A4B" letter-spacing="0.3">TASK.md</text>

      <!-- download/save hint while it sits in the chat -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.35;0.43;0.46;1" dur="12s" repeatCount="indefinite"/>
        <g transform="translate(20,-26)" stroke="#D97757" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 0 -5 V 4"/>
          <path d="M -4 0 L 0 4 L 4 0"/>
          <path d="M -5 7 H 5"/>
        </g>
      </g>

      <!-- one-shot click ripple at grab -->
      <circle cx="14" cy="8" r="2" fill="none" stroke="#D97757" stroke-width="2">
        <animate attributeName="r" values="2;2;16;2" keyTimes="0;0.44;0.49;1" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;0.7;0" keyTimes="0;0.44;0.49;1" dur="12s" repeatCount="indefinite"/>
      </circle>

      <!-- "you" tag riding along during the carry -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.47;0.50;0.60;0.64" dur="12s" repeatCount="indefinite"/>
        <rect x="26" y="14" width="34" height="18" rx="9" fill="#D97757"/>
        <text x="43" y="27" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">you</text>
      </g>

      <!-- the cursor doing the carrying -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.43;0.46;0.61;0.65" dur="12s" repeatCount="indefinite"/>
        <path d="M 14 8 L 14 30 L 20 24 L 24 32 L 28 30 L 24 22 L 31 22 Z" fill="#2A2723" stroke="#FFFFFF" stroke-width="1.4" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
