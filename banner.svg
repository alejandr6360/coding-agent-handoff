<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" width="1080" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="In a chat assistant a request is typed and the skill outputs a context file that emerges from the chat; you carry that file into a coding agent, where work begins">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFAF8"/>
      <stop offset="1" stop-color="#F1EDE6"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E08A6B"/>
      <stop offset="1" stop-color="#D97757"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#D9CFC1" opacity="0.55"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#9C8E7A" flood-opacity="0.18"/>
    </filter>
    <clipPath id="typeclip">
      <rect x="88" y="316" width="0" height="32">
        <animate attributeName="width" values="0;0;250;250;0;0" keyTimes="0;0.02;0.16;0.17;0.18;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1080" height="400" fill="url(#bg)"/>
  <rect width="1080" height="400" fill="url(#dots)"/>

  <!-- titles -->
  <text x="540" y="54" text-anchor="middle" font-size="31" font-weight="700" fill="#2A2723">From conversation to execution</text>
  <text x="540" y="88" text-anchor="middle" font-size="17" font-weight="600" fill="#8A7E6E" letter-spacing="2">CHAT&#160;&#160;&#8594;&#160;&#160;<tspan fill="#D97757" font-weight="800">YOU</tspan>&#160;&#160;&#8594;&#160;&#160;CODING&#160;AGENT</text>

  <!-- ===================== LEFT CARD: chat assistant ===================== -->
  <g filter="url(#soft)">
    <rect x="44" y="120" width="360" height="240" rx="22" fill="#FFFFFF" stroke="#EAE2D6" stroke-width="2"/>
  </g>
  <circle cx="78" cy="158" r="8" fill="url(#clay)"/>
  <text x="98" y="166" font-size="21" font-weight="700" fill="#3A352E">chat</text>

  <!-- prior conversation (the context) -->
  <g>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.16;0.22;1" dur="12s" repeatCount="indefinite"/>
    <rect x="72" y="190" width="190" height="26" rx="13" fill="#F1ECE4"/>
    <rect x="200" y="226" width="178" height="26" rx="13" fill="#F6E4DC"/>
  </g>

  <!-- skill running chip -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.17;0.22;0.30;0.34;1" dur="12s" repeatCount="indefinite"/>
    <ellipse cx="224" cy="224" rx="150" ry="30" fill="url(#glow)"/>
    <rect x="84" y="206" width="280" height="38" rx="19" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>
    <text x="106" y="231" font-size="16.5" font-weight="700" fill="#C06A4B"><tspan fill="#E08A6B" font-size="18">&#10022; </tspan>coding-agent-handoff</text>
  </g>

  <!-- input box with typed request -->
  <rect x="72" y="310" width="298" height="40" rx="20" fill="#F7F3EC" stroke="#E7DECF" stroke-width="1.6"/>
  <text x="90" y="336" clip-path="url(#typeclip)" font-family="'SF Mono','JetBrains Mono','Fira Mono',Menlo,Consolas,monospace" font-size="15" fill="#4A4337">
    hand off to my coding agent
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.16;0.19;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <g>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.17;0.175;0.99;1" dur="12s" repeatCount="indefinite"/>
    <rect y="322" width="2.5" height="18" fill="#D97757">
      <animate attributeName="x" values="90;90;338;338;90" keyTimes="0;0.02;0.16;0.985;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <circle cx="388" cy="330" r="18" fill="url(#clay)"/>
  <path d="M 381 322 L 397 330 L 381 338 Z" fill="#FFFFFF"/>

  <!-- ===================== RIGHT CARD: coding agent ===================== -->
  <g filter="url(#soft)">
    <rect x="676" y="120" width="360" height="240" rx="22" fill="#FFFFFF" stroke="#EAE2D6" stroke-width="2"/>
    <path d="M 676 142 a22 22 0 0 1 22 -22 h316 a22 22 0 0 1 22 22 v22 h-360 Z" fill="#F6F2EB"/>
  </g>
  <circle cx="702" cy="143" r="6" fill="#E5C0B4"/>
  <circle cx="722" cy="143" r="6" fill="#EBD8B8"/>
  <circle cx="742" cy="143" r="6" fill="#C9DCC2"/>
  <text x="1016" y="149" text-anchor="end" font-size="15" font-weight="700" fill="#9A8E7C">coding agent</text>

  <g font-family="'SF Mono','JetBrains Mono','Fira Mono',Menlo,Consolas,monospace" font-size="16">
    <!-- idle prompt (waiting for you to drop the brief in) -->
    <g>
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.62;0.64;0.99;1" dur="12s" repeatCount="indefinite"/>
      <text x="700" y="206" fill="#C06A4B">&#10095;</text>
      <rect x="720" y="193" width="10" height="17" fill="#D97757">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- work, revealed in sequence -->
    <text x="700" y="200" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>reading the brief&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.65;0.69;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="700" y="232" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>orienting in repo&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.75;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="700" y="264" fill="#4E7A52" font-weight="600" opacity="0"><tspan font-weight="700">+ </tspan>implementing the plan
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.77;0.81;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="700" y="296" fill="#5C5345" opacity="0"><tspan fill="#C06A4B">&#10095; </tspan>running tests&#8230;
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.86;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.86;0.97;1" dur="12s" repeatCount="indefinite"/>
      <rect x="700" y="312" width="300" height="12" rx="6" fill="#EDE6DB"/>
      <rect x="700" y="312" width="0" height="12" rx="6" fill="url(#clay)">
        <animate attributeName="width" values="0;0;300;300;0" keyTimes="0;0.87;0.94;0.97;1" dur="12s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="700" y="348" fill="#4E7A52" font-weight="700" opacity="0"><tspan>&#10003; </tspan>12 passing
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.94;0.96;0.99;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- ====== THE CONTEXT FILE — emerges from the chat, then you carry it ====== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.34;0.62;0.66;1" dur="12s" repeatCount="indefinite"/>
    <animateMotion path="M 224 224 C 420 150, 600 150, 748 232" keyTimes="0;0.45;0.62;1" keyPoints="0;0;1;1" calcMode="linear" dur="12s" repeatCount="indefinite"/>

    <g>
      <animateTransform attributeName="transform" type="scale" values="0.5;0.5;1;1" keyTimes="0;0.30;0.40;1" dur="12s" repeatCount="indefinite"/>

      <circle cx="0" cy="0" r="40" fill="url(#glow)">
        <animate attributeName="r" values="32;44;32" dur="1.4s" repeatCount="indefinite"/>
      </circle>

      <g filter="url(#soft)">
        <path d="M -32 -40 H 18 L 32 -26 V 40 H -32 Z" fill="#FFFFFF" stroke="#D97757" stroke-width="2.4" stroke-linejoin="round"/>
        <path d="M 18 -40 V -26 H 32 Z" fill="#F6E5DD" stroke="#D97757" stroke-width="2.4" stroke-linejoin="round"/>
      </g>
      <rect x="-22" y="-30" width="28" height="5" rx="2.5" fill="#E2A488"/>
      <rect x="-22" y="-16" width="44" height="4.5" rx="2.25" fill="#EFCBBA"/>
      <rect x="-22" y="-5" width="40" height="4.5" rx="2.25" fill="#EFCBBA"/>
      <rect x="-22" y="6" width="44" height="4.5" rx="2.25" fill="#EFCBBA"/>
      <rect x="-22" y="17" width="28" height="4.5" rx="2.25" fill="#EFCBBA"/>
      <text x="0" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#C06A4B" letter-spacing="0.4">TASK.md</text>

      <!-- download/save hint while it sits in the chat -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.34;0.36;0.43;0.46;1" dur="12s" repeatCount="indefinite"/>
        <g transform="translate(26,-32)" stroke="#D97757" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 0 -6 V 5"/>
          <path d="M -5 0 L 0 5 L 5 0"/>
          <path d="M -6 9 H 6"/>
        </g>
      </g>

      <!-- one-shot click ripple at grab -->
      <circle cx="18" cy="12" r="2" fill="none" stroke="#D97757" stroke-width="2.4">
        <animate attributeName="r" values="2;2;20;2" keyTimes="0;0.44;0.49;1" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;0.7;0" keyTimes="0;0.44;0.49;1" dur="12s" repeatCount="indefinite"/>
      </circle>

      <!-- "you" tag riding along during the carry -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.47;0.50;0.60;0.64" dur="12s" repeatCount="indefinite"/>
        <rect x="34" y="20" width="44" height="24" rx="12" fill="#D97757"/>
        <text x="56" y="37" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">you</text>
      </g>

      <!-- the cursor doing the carrying -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.43;0.46;0.61;0.65" dur="12s" repeatCount="indefinite"/>
        <path d="M 18 12 L 18 42 L 26 34 L 31 44 L 36 42 L 31 32 L 41 32 Z" fill="#2A2723" stroke="#FFFFFF" stroke-width="1.8" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
